# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  run-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TSX: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_STANDARD: false
          # pylint runs as its own (non-blocking) job in python-app.yml;
          # super-linter's strict pylint duplicates that with stricter defaults.
          VALIDATE_PYTHON_PYLINT: false
          # jscpd flags pre-existing legitimate duplication (async/sync decorator
          # pair, parallel list-validate-skip loops) — not a CI gate worth fighting.
          VALIDATE_JSCPD: false
          # super-linter v4's isort config-copy logic doesn't pick up
          # .github/linters/.isort.cfg reliably and falls back to a non-black
          # profile, so it disagrees with our [tool.isort] (profile=black) in
          # pyproject.toml. Local dev + pyproject.toml enforce isort; PYTHON_BLACK
          # in super-linter still catches formatting drift.
          VALIDATE_PYTHON_ISORT: false
          FILTER_REGEX_EXCLUDE: .*tsconfig.*\.json
